<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">SoundPax - Android soundboard UI</title>
  <desc id="desc">Visual mockup of the 4x4 pad grid soundboard with transport bar, loaded pads, and share controls.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="padLoaded" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2830"/>
      <stop offset="100%" stop-color="#0F1A1E"/>
    </linearGradient>
    <linearGradient id="padPlaying" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <style>
      .label { font-family: 'Segoe UI', Roboto, system-ui, sans-serif; fill: #F0F0F0; }
      .muted { font-family: 'Segoe UI', Roboto, system-ui, sans-serif; fill: #8E8E8E; }
      .dim { font-family: 'Segoe UI', Roboto, system-ui, sans-serif; fill: #555555; }
      .cyan { fill: #00E5FF; }
      .pad-text { font-family: 'Segoe UI', Roboto, system-ui, sans-serif; font-size: 11px; font-weight: 600; fill: #F0F0F0; }
      .pad-num { font-family: 'Segoe UI', Roboto, system-ui, sans-serif; font-size: 9px; fill: #555555; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#181818"/>

  <g filter="url(#softShadow)">
    <rect x="80" y="40" width="1040" height="680" rx="28" fill="#1A1A1A" stroke="#333" stroke-width="2"/>
    <rect x="96" y="56" width="1008" height="648" rx="16" fill="url(#bg)"/>
    <circle cx="600" cy="72" r="4" fill="#2B2B2B"/>
  </g>

  <g transform="translate(96, 56)">
    <rect width="1008" height="56" fill="#0E0E0E"/>
    <line x1="0" y1="56" x2="1008" y2="56" stroke="#2B2B2B" stroke-width="1"/>

    <g transform="translate(20, 18)">
      <rect x="0" y="0" width="7" height="7" rx="1" class="cyan"/>
      <rect x="10" y="0" width="7" height="7" rx="1" class="cyan" opacity="0.7"/>
      <rect x="0" y="10" width="7" height="7" rx="1" class="cyan" opacity="0.7"/>
      <rect x="10" y="10" width="7" height="7" rx="1" class="cyan" opacity="0.5"/>
    </g>

    <text x="52" y="26" class="label" font-size="16" font-weight="700">SoundPax</text>
    <text x="52" y="42" class="muted" font-size="12">Default Bank</text>

    <g transform="translate(780, 10)">
      <rect x="0" y="0" width="64" height="36" rx="8" fill="#1E1E1E"/>
      <circle cx="32" cy="14" r="8" fill="none" stroke="#F0F0F0" stroke-width="1.5"/>
      <rect x="28" y="10" width="8" height="8" rx="1" fill="#F0F0F0"/>
      <text x="32" y="32" text-anchor="middle" class="muted" font-size="9">Stop</text>

      <rect x="72" y="0" width="64" height="36" rx="8" fill="#1E1E1E"/>
      <path d="M104 10 L104 18 M100 14 L104 10 L108 14" fill="none" stroke="#F0F0F0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="98" cy="20" r="2.5" fill="#F0F0F0"/>
      <circle cx="110" cy="16" r="2.5" fill="#F0F0F0"/>
      <circle cx="110" cy="24" r="2.5" fill="#F0F0F0"/>
      <text x="104" y="32" text-anchor="middle" class="muted" font-size="9">Share</text>

      <rect x="144" y="0" width="64" height="36" rx="8" fill="#1E1E1E"/>
      <path d="M168 12 L168 22 M164 16 L168 12 L172 16" fill="none" stroke="#F0F0F0" stroke-width="1.5" stroke-linecap="round"/>
      <rect x="164" y="18" width="8" height="6" rx="1" fill="none" stroke="#F0F0F0" stroke-width="1.2"/>
      <text x="176" y="32" text-anchor="middle" class="muted" font-size="9">Banks</text>
    </g>

    <g transform="translate(144, 96)">
      <g id="pad1" filter="url(#glow)">
        <rect x="0" y="0" width="167" height="167" rx="12" fill="url(#padPlaying)" stroke="#00E5FF" stroke-width="2.5"/>
        <rect x="0" y="0" width="167" height="167" rx="12" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.4"/>
        <text x="83" y="88" text-anchor="middle" class="pad-text">Kick</text>
        <text x="83" y="102" text-anchor="middle" class="pad-num">PAD 1 | PLAYING</text>
        <rect x="50" y="115" width="4" height="18" rx="1" fill="#00E5FF" opacity="0.8"/>
        <rect x="58" y="108" width="4" height="25" rx="1" fill="#00E5FF" opacity="0.9"/>
        <rect x="66" y="112" width="4" height="21" rx="1" fill="#00E5FF"/>
        <rect x="74" y="105" width="4" height="28" rx="1" fill="#00E5FF"/>
        <rect x="82" y="110" width="4" height="23" rx="1" fill="#00E5FF"/>
        <rect x="90" y="107" width="4" height="26" rx="1" fill="#00E5FF"/>
        <rect x="98" y="114" width="4" height="19" rx="1" fill="#00E5FF" opacity="0.8"/>
        <rect x="106" y="109" width="4" height="24" rx="1" fill="#00E5FF" opacity="0.9"/>
      </g>

      <g id="pad2">
        <rect x="177" y="0" width="167" height="167" rx="12" fill="url(#padLoaded)" stroke="#00E5FF" stroke-width="1" opacity="0.9"/>
        <rect x="177" y="0" width="167" height="167" rx="12" fill="none" stroke="#00E5FF" stroke-opacity="0.35"/>
        <text x="260" y="88" text-anchor="middle" class="pad-text">Snare</text>
        <text x="260" y="102" text-anchor="middle" class="pad-num">PAD 2</text>
      </g>

      <g id="pad3">
        <rect x="354" y="0" width="167" height="167" rx="12" fill="url(#padLoaded)" stroke="#00E5FF" stroke-width="1"/>
        <rect x="354" y="0" width="167" height="167" rx="12" fill="none" stroke="#00E5FF" stroke-opacity="0.35"/>
        <text x="437" y="88" text-anchor="middle" class="pad-text">Clap</text>
        <text x="437" y="102" text-anchor="middle" class="pad-num">PAD 3</text>
      </g>

      <g id="pad4">
        <rect x="531" y="0" width="167" height="167" rx="12" fill="#28251C" stroke="#2B2B2B"/>
        <text x="614" y="88" text-anchor="middle" class="pad-text" fill="#555">+</text>
        <text x="614" y="102" text-anchor="middle" class="pad-num">PAD 4 | TAP TO RECORD</text>
      </g>

      <g id="pad5">
        <rect x="0" y="177" width="167" height="167" rx="12" fill="url(#padLoaded)" stroke="#00E5FF" stroke-width="1"/>
        <rect x="0" y="177" width="167" height="167" rx="12" fill="none" stroke="#00E5FF" stroke-opacity="0.35"/>
        <text x="83" y="265" text-anchor="middle" class="pad-text">Hi-Hat</text>
        <text x="83" y="279" text-anchor="middle" class="pad-num">PAD 5</text>
      </g>

      <g id="pad6">
        <rect x="177" y="177" width="167" height="167" rx="12" fill="#231C28" stroke="#2B2B2B"/>
        <text x="260" y="265" text-anchor="middle" class="pad-text" fill="#555">+</text>
        <text x="260" y="279" text-anchor="middle" class="pad-num">PAD 6</text>
      </g>

      <g id="pad7">
        <rect x="354" y="177" width="167" height="167" rx="12" fill="#1C2825" stroke="#2B2B2B"/>
        <text x="437" y="265" text-anchor="middle" class="pad-text" fill="#555">+</text>
        <text x="437" y="279" text-anchor="middle" class="pad-num">PAD 7</text>
      </g>

      <g id="pad8">
        <rect x="531" y="177" width="167" height="167" rx="12" fill="#1C1C28" stroke="#2B2B2B"/>
        <text x="614" y="265" text-anchor="middle" class="pad-text" fill="#555">+</text>
        <text x="614" y="279" text-anchor="middle" class="pad-num">PAD 8</text>
      </g>

      <g id="pad9">
        <rect x="0" y="354" width="167" height="167" rx="12" fill="url(#padLoaded)" stroke="#00E5FF" stroke-width="1"/>
        <text x="83" y="442" text-anchor="middle" class="pad-text">Bass</text>
        <text x="83" y="456" text-anchor="middle" class="pad-num">PAD 9</text>
      </g>
      <g id="pad10"><rect x="177" y="354" width="167" height="167" rx="12" fill="#28251C" stroke="#2B2B2B"/><text x="260" y="442" text-anchor="middle" class="pad-text" fill="#555">+</text><text x="260" y="456" text-anchor="middle" class="pad-num">PAD 10</text></g>
      <g id="pad11"><rect x="354" y="354" width="167" height="167" rx="12" fill="#231C28" stroke="#2B2B2B"/><text x="437" y="442" text-anchor="middle" class="pad-text" fill="#555">+</text><text x="437" y="456" text-anchor="middle" class="pad-num">PAD 11</text></g>
      <g id="pad12"><rect x="531" y="354" width="167" height="167" rx="12" fill="#1C2825" stroke="#2B2B2B"/><text x="614" y="442" text-anchor="middle" class="pad-text" fill="#555">+</text><text x="614" y="456" text-anchor="middle" class="pad-num">PAD 12</text></g>
      <g id="pad13"><rect x="0" y="531" width="167" height="167" rx="12" fill="#1C1C28" stroke="#2B2B2B"/><text x="83" y="619" text-anchor="middle" class="pad-text" fill="#555">+</text><text x="83" y="633" text-anchor="middle" class="pad-num">PAD 13</text></g>
      <g id="pad14"><rect x="177" y="531" width="167" height="167" rx="12" fill="#28251C" stroke="#2B2B2B"/><text x="260" y="619" text-anchor="middle" class="pad-text" fill="#555">+</text><text x="260" y="633" text-anchor="middle" class="pad-num">PAD 14</text></g>
      <g id="pad15"><rect x="354" y="531" width="167" height="167" rx="12" fill="#231C28" stroke="#2B2B2B"/><text x="437" y="619" text-anchor="middle" class="pad-text" fill="#555">+</text><text x="437" y="633" text-anchor="middle" class="pad-num">PAD 15</text></g>
      <g id="pad16"><rect x="531" y="531" width="167" height="167" rx="12" fill="#1C2825" stroke="#2B2B2B"/><text x="614" y="619" text-anchor="middle" class="pad-text" fill="#555">+</text><text x="614" y="633" text-anchor="middle" class="pad-num">PAD 16</text></g>
    </g>

    <text x="504" y="640" text-anchor="middle" class="dim" font-size="12">5 / 16 pads loaded | Tap to play | Long-press to edit or share</text>

    <g transform="translate(900, 120)">
      <rect width="88" height="520" rx="12" fill="#141414" stroke="#2B2B2B"/>
      <text x="44" y="28" text-anchor="middle" class="label" font-size="11" font-weight="700">Stack</text>

      <circle cx="20" cy="52" r="4" class="cyan"/>
      <text x="30" y="56" class="muted" font-size="9">Flutter UI</text>

      <circle cx="20" cy="72" r="4" fill="#B388FF"/>
      <text x="30" y="76" class="muted" font-size="9">Provider state</text>

      <circle cx="20" cy="92" r="4" fill="#FF6B9D"/>
      <text x="30" y="96" class="muted" font-size="9">just_audio x16</text>

      <circle cx="20" cy="112" r="4" fill="#00E676"/>
      <text x="30" y="116" class="muted" font-size="9">record to WAV</text>

      <line x1="12" y1="130" x2="76" y2="130" stroke="#2B2B2B"/>

      <text x="44" y="150" text-anchor="middle" class="label" font-size="11" font-weight="700">Rust</text>
      <text x="44" y="168" text-anchor="middle" class="muted" font-size="8">normalize</text>
      <text x="44" y="180" text-anchor="middle" class="muted" font-size="8">file_io</text>
      <text x="44" y="192" text-anchor="middle" class="muted" font-size="8">bank JSON</text>

      <line x1="12" y1="206" x2="76" y2="206" stroke="#2B2B2B"/>

      <text x="44" y="226" text-anchor="middle" class="label" font-size="11" font-weight="700">Actions</text>
      <text x="44" y="246" text-anchor="middle" class="muted" font-size="8">Tap empty to record</text>
      <text x="44" y="260" text-anchor="middle" class="muted" font-size="8">Tap loaded to play</text>
      <text x="44" y="274" text-anchor="middle" class="muted" font-size="8">Long-press menu</text>
      <text x="44" y="288" text-anchor="middle" class="muted" font-size="8">Share via Android</text>
      <text x="44" y="302" text-anchor="middle" class="muted" font-size="8">share sheet</text>

      <g transform="translate(34, 330)">
        <rect x="8" y="0" width="12" height="20" rx="6" fill="none" stroke="#00E676" stroke-width="1.5"/>
        <path d="M4 14 Q14 22 24 14" fill="none" stroke="#00E676" stroke-width="1.5"/>
        <line x1="14" y1="22" x2="14" y2="28" stroke="#00E676" stroke-width="1.5"/>
        <line x1="8" y1="28" x2="20" y2="28" stroke="#00E676" stroke-width="1.5"/>
      </g>
      <text x="44" y="378" text-anchor="middle" class="muted" font-size="8">Mic to normalize</text>
      <text x="44" y="390" text-anchor="middle" class="muted" font-size="8">then save to pad</text>
    </g>
  </g>

  <text x="600" y="728" text-anchor="middle" class="muted" font-size="13">SoundPax Phase 1 - 4x4 Android soundboard on Lenovo Tablet Plus landscape</text>
</svg>
